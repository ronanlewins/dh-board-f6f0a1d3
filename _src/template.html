<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Dark Horse — Meta Ads</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Spectral:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d0b0a;
    --panel: #17130f;
    --panel-2: #1f1813;
    --line: #2c241d;
    --text: #ece8e2;
    --muted: #9a8f83;
    --gold: #efc88e;
    --brick: #bd312e;
    --green: #93C47D;
    --amber: #efc88e;
    --grey: #8a8580;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Figtree", system-ui, -apple-system, sans-serif;
    line-height: 1.55;
    padding: 28px 20px 64px;
    max-width: 760px;
    margin: 0 auto;
  }
  .brand {
    font-size: 12px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 6px;
  }
  h1 {
    font-family: "Spectral", Georgia, serif;
    font-weight: 500;
    font-size: 30px;
    line-height: 1.1;
    margin-bottom: 4px;
  }
  .week {
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 20px;
  }
  .status {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 11px 18px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 15px;
    border: 1px solid var(--line);
    background: var(--panel);
    margin-bottom: 18px;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; flex: none; }
  .s-measurement .dot { background: var(--grey); }
  .s-ontrack .dot { background: var(--green); }
  .s-watch .dot { background: var(--amber); }
  .s-problem .dot { background: var(--brick); }
  .headline {
    font-family: "Spectral", Georgia, serif;
    font-size: 18px;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--line);
    border-left: 3px solid var(--gold);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 22px;
  }
  .btn-video {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    text-decoration: none;
    background: var(--gold); color: #1a1308;
    font-weight: 700; font-size: 16px;
    padding: 15px 20px; border-radius: 12px;
    margin-bottom: 30px;
  }
  .btn-video .play {
    width: 24px; height: 24px; border-radius: 50%;
    background: #1a1308; color: var(--gold);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; flex: none;
  }
  .btn-video .sub { font-weight: 500; opacity: .7; font-size: 13px; }
  .section-label {
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin: 0 0 12px 2px;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 30px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
  }
  .card.wide { grid-column: span 2; }
  .card .label {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .card .value {
    font-family: "Spectral", Georgia, serif;
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .card .sub { font-size: 12.5px; color: var(--muted); margin-top: 3px; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 10px;
    font-size: 12px; font-weight: 600;
    color: var(--pc);
    background: color-mix(in srgb, var(--pc) 15%, transparent);
    border: 1px solid color-mix(in srgb, var(--pc) 38%, transparent);
    padding: 3px 9px; border-radius: 999px;
  }
  .pdot { width: 7px; height: 7px; border-radius: 50%; background: var(--pc); flex: none; }
  .legend {
    display: flex; flex-wrap: wrap; gap: 14px;
    margin: -16px 2px 30px;
    font-size: 12px; color: var(--muted);
  }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .legend i { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .trend {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 30px;
  }
  .trend .empty { color: var(--muted); font-size: 14px; font-style: italic; }
  .block { margin-bottom: 26px; }
  .explainer {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 18px 18px 10px;
    margin-bottom: 30px;
  }
  .explainer h3 { font-size: 16px; color: var(--muted); }
  .explainer li { font-size: 14.5px; color: var(--muted); }
  .explainer li strong { color: var(--text); }
  .block h3 {
    font-family: "Spectral", Georgia, serif;
    font-weight: 600;
    font-size: 19px;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 9px;
  }
  .block h3 .icon { font-size: 16px; }
  .block ul { list-style: none; }
  .block li {
    position: relative;
    padding-left: 18px;
    margin-bottom: 9px;
    color: #d8d2c9;
    font-size: 15.5px;
  }
  .block li::before {
    content: "";
    position: absolute; left: 0; top: 10px;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold);
  }
  .plan {
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line);
    border-top: 3px solid var(--gold);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 34px;
  }
  .plan h3 { color: var(--gold); }
  .plan p { font-size: 16.5px; font-family: "Spectral", Georgia, serif; }
  footer {
    border-top: 1px solid var(--line);
    padding-top: 16px;
    color: var(--muted);
    font-size: 12.5px;
    line-height: 1.6;
  }
  footer a { color: var(--gold); text-decoration: none; font-weight: 600; }
  .sheet-link {
    display: inline-block;
    margin-bottom: 22px;
    color: var(--gold); text-decoration: none; font-weight: 600; font-size: 14.5px;
    border-bottom: 1px solid color-mix(in srgb, var(--gold) 40%, transparent);
    padding-bottom: 2px;
  }
  svg { display: block; width: 100%; height: auto; overflow: visible; }
  @media (max-width: 420px) {
    h1 { font-size: 26px; }
    .card .value { font-size: 24px; }
  }
</style>
</head>
<body>
  <div id="app">
    <p class="week">Loading…</p>
  </div>

<script>
const STATUS = {
  measurement: { cls: "s-measurement", label: "Measurement window" },
  ontrack:     { cls: "s-ontrack",     label: "On track" },
  watch:       { cls: "s-watch",       label: "Watch" },
  problem:     { cls: "s-problem",     label: "Problem" }
};

function el(html) { const t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstChild; }
function esc(s) { return String(s).replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c])); }

// Plain-English band tags. Colour key + default wording; the weekly report sets the band per metric.
const BANDS = {
  great: { c: "#86c46a", t: "Great" },
  good:  { c: "#a8cf96", t: "Good" },
  watch: { c: "#e6b75e", t: "Watch" },
  high:  { c: "#e0894f", t: "Running high" },
  low:   { c: "#e0894f", t: "Running low" },
  poor:  { c: "#d9534f", t: "Needs attention" }
};

function pill(band, label, provisional) {
  const b = BANDS[band];
  if (!b) return "";
  const txt = (label || b.t) + (provisional ? " · early" : "");
  return `<div class="pill" style="--pc:${b.c}${provisional ? ";opacity:.6" : ""}"><span class="pdot"></span>${esc(txt)}</div>`;
}

function shortWeek(w) {
  // "2026-06-21" -> "21 Jun"
  const d = (w.week_ending || "").split("-");
  if (d.length === 3) {
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return `${parseInt(d[2], 10)} ${months[parseInt(d[1], 10) - 1] || ""}`.trim();
  }
  return w.week_label || w.week_ending || "";
}

// Cost-per-enquiry trend chart. Healthy = under €40 (the operating range for this funnel).
function sparkline(weeks, key, unit) {
  const HEALTHY = 40; // €/enquiry: at or below this is a healthy cost for this kind of campaign
  const series = weeks
    .filter(w => w.metrics && typeof w.metrics[key] === "number")
    .map(w => ({ v: w.metrics[key], label: shortWeek(w) }));

  if (series.length < 2) {
    return `<p class="empty">This chart fills in as more weeks are added — you'll see the cost per enquiry move week to week. (${series.length} week so far.)</p>`;
  }

  const vals = series.map(s => s.v);
  const maxV = Math.max(...vals);
  const W = 640, H = 300;
  const padL = 52, padR = 22, padTop = 44, padBot = 56;
  const plotW = W - padL - padR, plotH = H - padTop - padBot;
  // Scale always starts at €0 and always shows the €40 healthy line, with headroom above the highest point.
  const yMax = Math.max(maxV * 1.25, HEALTHY + 12);
  const x = i => padL + (series.length === 1 ? plotW / 2 : i * (plotW / (series.length - 1)));
  const y = v => padTop + plotH * (1 - v / yMax);

  const baseY = y(0), healthyY = y(HEALTHY);
  const pts = series.map((s, i) => [x(i), y(s.v)]);
  const line = pts.map(([px, py]) => `${px.toFixed(1)},${py.toFixed(1)}`).join(" ");

  // Thin labels if the chart ever gets crowded.
  const everyNth = series.length > 8 ? 2 : 1;

  const dots = pts.map(([px, py], i) => {
    const s = series[i];
    const valLbl = `<text x="${px.toFixed(1)}" y="${(py - 14).toFixed(1)}" text-anchor="middle" font-size="17" font-weight="700" fill="#f0e9dd">${unit}${s.v}</text>`;
    const wkLbl = (i % everyNth === 0)
      ? `<text x="${px.toFixed(1)}" y="${(baseY + 26).toFixed(1)}" text-anchor="middle" font-size="14" fill="#9a8f83">${esc(s.label)}</text>`
      : "";
    return `<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="5" fill="#efc88e" stroke="#1a1714" stroke-width="2" />${valLbl}${wkLbl}`;
  }).join("");

  const last = series[series.length - 1].v;
  const inHealthy = last <= HEALTHY;

  return `
    <svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Cost per enquiry, week by week. Latest ${unit}${last}.">
      <!-- healthy zone -->
      <rect x="${padL}" y="${healthyY.toFixed(1)}" width="${plotW}" height="${(baseY - healthyY).toFixed(1)}" fill="#86c46a" fill-opacity="0.13" />
      <line x1="${padL}" y1="${healthyY.toFixed(1)}" x2="${padL + plotW}" y2="${healthyY.toFixed(1)}" stroke="#86c46a" stroke-width="1.5" stroke-dasharray="5 5" />
      <text x="${padL + 6}" y="${(healthyY - 8).toFixed(1)}" font-size="14" fill="#86c46a" font-weight="600">Healthy zone — under ${unit}${HEALTHY}</text>
      <!-- axis -->
      <line x1="${padL}" y1="${baseY.toFixed(1)}" x2="${padL + plotW}" y2="${baseY.toFixed(1)}" stroke="#3a342c" stroke-width="1.5" />
      <text x="${(padL - 10).toFixed(1)}" y="${(healthyY + 5).toFixed(1)}" text-anchor="end" font-size="13" fill="#7d7367">${unit}${HEALTHY}</text>
      <text x="${(padL - 10).toFixed(1)}" y="${(baseY + 5).toFixed(1)}" text-anchor="end" font-size="13" fill="#7d7367">${unit}0</text>
      <!-- trend line -->
      <polyline points="${line}" fill="none" stroke="#efc88e" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" />
      ${dots}
    </svg>
    <p class="empty" style="font-style:normal;margin-top:12px;color:#b8afa1;font-size:14px;line-height:1.55;">
      <strong style="color:#d8d2c9;">What this shows:</strong> each dot is one week. It's what we pay in Facebook ads to get one enquiry — <strong style="color:#d8d2c9;">lower is better</strong>.
      As long as the line stays in the green band (under ${unit}${HEALTHY}), the cost is healthy.
      Right now it's at <strong style="color:#d8d2c9;">${unit}${last}</strong>${inHealthy ? ", well inside the healthy range" : ""}.
    </p>`;
}

function render(data) {
  const weeks = data.weeks || [];
  const w = weeks[weeks.length - 1];
  const app = document.getElementById("app");
  if (!w) { app.innerHTML = '<p class="week">No data yet.</p>'; return; }
  const st = STATUS[w.status] || STATUS.measurement;
  const c = w.cards || {};
  const prov = w.status === "measurement";

  app.innerHTML = `
    <p class="brand">Dark Horse · Meta Ads</p>
    <h1>This week's ad performance</h1>
    <p class="week">${esc(w.week_label || w.week_ending)}</p>

    <div class="status ${st.cls}"><span class="dot"></span>${esc(w.status_label || st.label)}</div>

    ${w.headline ? `<div class="headline">${esc(w.headline)}</div>` : ""}

    ${w.video_url ? `<a class="btn-video" href="${esc(w.video_url)}" target="_blank" rel="noopener"><span class="play">▶</span><span>Watch this week's walkthrough <span class="sub">(quick video from Ronan)</span></span></a>` : ""}

    <p class="section-label">The numbers</p>
    <div class="cards">
      <div class="card"><div class="label">Spend</div><div class="value">${esc(c.spend || "—")}</div></div>
      <div class="card"><div class="label">Enquiries</div><div class="value">${esc(c.enquiries || "—")}</div>${c.enquiries_sub ? `<div class="sub">${esc(c.enquiries_sub)}</div>` : ""}</div>
      <div class="card"><div class="label">Cost per enquiry</div><div class="value">${esc(c.cost_per_enquiry || "—")}</div>${c.cost_per_enquiry_sub ? `<div class="sub">${esc(c.cost_per_enquiry_sub)}</div>` : ""}${pill(c.cost_per_enquiry_band, c.cost_per_enquiry_band_label, prov)}</div>
      <div class="card"><div class="label">Click rate</div><div class="value">${esc(c.click_rate || "—")}</div>${pill(c.click_rate_band, c.click_rate_band_label, prov)}</div>
      <div class="card wide"><div class="label">Best performing ad</div><div class="value">${esc(c.best_ad || "—")}</div></div>
    </div>
    <div class="legend">
      <span><i style="background:#86c46a"></i>Good</span>
      <span><i style="background:#e6b75e"></i>Keep an eye</span>
      <span><i style="background:#d9534f"></i>Needs attention</span>
      ${prov ? `<span style="font-style:italic">“early” = too soon to be meaningful (week 1)</span>` : ""}
    </div>

    <p class="section-label">Cost per enquiry over time</p>
    <div class="trend">${sparkline(weeks, "cpl", "€")}</div>

    <div class="block">
      <h3><span class="icon">✓</span>What's working</h3>
      <ul>${(w.working || []).map(x => `<li>${esc(x)}</li>`).join("") || "<li>—</li>"}</ul>
    </div>

    <div class="block">
      <h3><span class="icon">!</span>What's not</h3>
      <ul>${(w.not_working || []).map(x => `<li>${esc(x)}</li>`).join("") || "<li>None this week.</li>"}</ul>
    </div>

    <div class="plan">
      <h3>→ The plan</h3>
      <p>${esc(w.next_move || "—")}</p>
    </div>

    <div class="block explainer">
      <h3><span class="icon">?</span>What the colours mean</h3>
      <ul>
        <li><strong>Good</strong> — this is healthy. Keep going, nothing to change.</li>
        <li><strong>Keep an eye</strong> — fine for now, just worth watching. No change yet.</li>
        <li><strong>Needs attention</strong> — something's off. We change one thing (usually the ad, the audience, or the landing page) and give it two weeks before judging.</li>
        <li><strong>“early”</strong> — too soon to read. Week-one numbers bounce around, so we wait before acting.</li>
      </ul>
    </div>

    ${data.sheet_url ? `<a class="sheet-link" href="${esc(data.sheet_url)}" target="_blank" rel="noopener">Want the full detail? Open the numbers sheet →</a>` : ""}

    <footer>
      Updated automatically each week from the Meta Ads dashboard.<br />
      Last updated: ${esc(data.updated || "—")} · Prepared by Ronan.${data.sheet_url ? ` · <a href="${esc(data.sheet_url)}" target="_blank" rel="noopener">Full sheet</a>` : ""}
    </footer>`;
}

// Data is inlined at build time (see build.sh), then the whole page is encrypted with StatiCrypt.
const DATA = __DATA__;
render(DATA);
</script>
</body>
</html>
