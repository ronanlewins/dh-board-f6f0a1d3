<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Dark Horse — Meta Ads</title>
<style>
  :root {
    /* Light Notion theme */
    --bg: #fbfbfa;          /* off-white page */
    --panel: #ffffff;       /* card / block background */
    --panel-2: #f7f6f4;     /* faint fill */
    --line: #e8e6e1;        /* warm-grey hairline border */
    --text: #37352f;        /* Notion ink */
    --muted: #787469;       /* warm grey */
    --gold-ink: #9a6a06;    /* dark gold — links / brand label (AA on white) */
    --gold-solid: #e6b24e;  /* solid gold — video button fill */
    --brick: #bd312e;
    --green: #6f9f6a;
    --amber: #caa53d;
    --grey: #9a958c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    line-height: 1.55;
    padding: 28px 20px 64px;
    max-width: 760px;
    margin: 0 auto;
  }
  .brand {
    font-size: 12px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--gold-ink);
    font-weight: 600;
    margin-bottom: 6px;
  }
  h1 {
    font-weight: 700;
    font-size: 30px;
    line-height: 1.15;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .week {
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 20px;
  }
  .status {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 15px;
    border: 1px solid var(--line);
    background: var(--panel);
    margin-bottom: 18px;
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; flex: none; }
  .s-measurement .dot { background: var(--grey); }
  .s-ontrack .dot { background: var(--green); }
  .s-watch .dot { background: var(--amber); }
  .s-problem .dot { background: var(--brick); }
  .headline {
    font-size: 17px;
    color: var(--text);
    background: #fbf6ea;
    border: 1px solid var(--line);
    border-left: 4px solid var(--gold-solid);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 22px;
  }
  .btn-video {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    text-decoration: none;
    background: var(--gold-solid); color: #3a2a05;
    font-weight: 700; font-size: 16px;
    padding: 15px 20px; border-radius: 10px;
    margin-bottom: 30px;
  }
  .btn-video .play {
    width: 24px; height: 24px; border-radius: 50%;
    background: #3a2a05; color: var(--gold-solid);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; flex: none;
  }
  .btn-video .sub { font-weight: 500; opacity: .75; font-size: 13px; }
  .section-label {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin: 0 0 12px 2px;
    padding-top: 4px;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  /* Notion-style block: white, soft warm border, rounded, minimal shadow */
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px;
    box-shadow: 0 1px 2px rgba(15, 15, 15, 0.03);
  }
  .card.wide { grid-column: span 2; }
  .card .label {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .card .value {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.015em;
    color: var(--text);
  }
  .card .sub { font-size: 12.5px; color: var(--muted); margin-top: 4px; }

  /* Zone-coded cards — soft wash + coloured left border + icon + text label.
     Colour is never the only cue: border + icon shape + word label all carry the zone. */
  .card.zone {
    background: var(--zbg);
    border: 1px solid color-mix(in srgb, var(--zb) 40%, var(--line));
    border-left: 4px solid var(--zb);
  }
  .card.zone .value { color: var(--zc); }      /* number in zone colour (AA on wash) */
  .card.zone .label { color: color-mix(in srgb, var(--zc) 70%, var(--muted)); }
  .zone-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .zone-icon {
    width: 18px; height: 18px; border-radius: 5px; flex: none;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; line-height: 1;
    background: var(--zb); color: #fff;
  }
  .zone-label {
    display: inline-flex; align-items: center;
    margin-top: 10px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.01em;
    color: var(--zc);
  }
  .zone-label.early { opacity: 0.7; font-weight: 600; }
  .legend {
    display: flex; flex-wrap: wrap; gap: 14px;
    margin: -12px 2px 30px;
    font-size: 12px; color: var(--muted);
  }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .legend i { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .trend {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 30px;
    box-shadow: 0 1px 2px rgba(15, 15, 15, 0.03);
  }
  .trend .empty { color: var(--muted); font-size: 14px; font-style: italic; }
  .block { margin-bottom: 26px; }
  .explainer {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px 18px 10px;
    margin-bottom: 30px;
  }
  .explainer h3 { font-size: 16px; color: var(--text); }
  .explainer li { font-size: 14.5px; color: var(--muted); }
  .explainer li strong { color: var(--text); }
  .block h3 {
    font-weight: 700;
    font-size: 19px;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 9px;
  }
  .block h3 .icon { font-size: 16px; }
  .block ul { list-style: none; }
  .block li {
    position: relative;
    padding-left: 18px;
    margin-bottom: 9px;
    color: #4a463e;
    font-size: 15.5px;
  }
  .block li::before {
    content: "";
    position: absolute; left: 0; top: 10px;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold-solid);
  }
  .plan {
    background: #fbf6ea;
    border: 1px solid var(--line);
    border-left: 4px solid var(--gold-solid);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 34px;
  }
  .plan h3 { color: var(--gold-ink); }
  .plan p { font-size: 16px; }
  footer {
    border-top: 1px solid var(--line);
    padding-top: 16px;
    color: var(--muted);
    font-size: 12.5px;
    line-height: 1.6;
  }
  footer a { color: var(--gold-ink); text-decoration: none; font-weight: 600; }
  .sheet-link {
    display: inline-block;
    margin-bottom: 22px;
    color: var(--gold-ink); text-decoration: none; font-weight: 600; font-size: 14.5px;
    border-bottom: 1px solid color-mix(in srgb, var(--gold-ink) 40%, transparent);
    padding-bottom: 2px;
  }
  svg { display: block; width: 100%; height: auto; overflow: visible; }
  @media (max-width: 420px) {
    h1 { font-size: 26px; }
    .card .value { font-size: 24px; }
  }
</style>
</head>
<body>
  <div id="app">
    <p class="week">Loading…</p>
  </div>

<script>
const STATUS = {
  measurement: { cls: "s-measurement", label: "Measurement window" },
  ontrack:     { cls: "s-ontrack",     label: "On track" },
  watch:       { cls: "s-watch",       label: "Watch" },
  problem:     { cls: "s-problem",     label: "Problem" }
};

function el(html) { const t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstChild; }
function esc(s) { return String(s).replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c])); }

// Zone bands. Each carries: text/number colour (tc, AA on its wash), wash bg, border colour (bc),
// and a distinct icon SHAPE — so the zone reads from border + shape + word label, never hue alone.
const BANDS = {
  great: { t: "Great",            tc: "#2e6e36", bg: "#edf5ec", bc: "#6f9f6a", icon: "✓" },
  good:  { t: "Good",             tc: "#2e6e36", bg: "#edf5ec", bc: "#6f9f6a", icon: "✓" },
  watch: { t: "Watch",            tc: "#8a6400", bg: "#fbf3e0", bc: "#caa53d", icon: "◆" },
  high:  { t: "Running high",     tc: "#9c4a1a", bg: "#fbeede", bc: "#d98a4a", icon: "▲" },
  low:   { t: "Running low",      tc: "#9c4a1a", bg: "#fbeede", bc: "#d98a4a", icon: "▼" },
  poor:  { t: "Needs attention",  tc: "#b22b27", bg: "#fbeceb", bc: "#bd312e", icon: "!" }
};

// Render one zone-coded numeric card with all three non-colour cues (border + icon + label).
function zoneCard(label, value, sub, band, bandLabel, provisional, wide) {
  const b = BANDS[band];
  if (!b) {
    // No band → fall back to a neutral block so we never deploy a broken card.
    return `<div class="card${wide ? " wide" : ""}"><div class="label">${esc(label)}</div><div class="value">${esc(value || "—")}</div>${sub ? `<div class="sub">${esc(sub)}</div>` : ""}</div>`;
  }
  const word = (bandLabel || b.t) + (provisional ? " · early" : "");
  return `
    <div class="card zone${wide ? " wide" : ""}" style="--zc:${b.tc};--zbg:${b.bg};--zb:${b.bc}">
      <div class="zone-head">
        <span class="zone-icon" aria-hidden="true">${b.icon}</span>
        <span class="label">${esc(label)}</span>
      </div>
      <div class="value">${esc(value || "—")}</div>
      ${sub ? `<div class="sub">${esc(sub)}</div>` : ""}
      <div class="zone-label${provisional ? " early" : ""}">${esc(word)}</div>
    </div>`;
}

function shortWeek(w) {
  // "2026-06-21" -> "21 Jun"
  const d = (w.week_ending || "").split("-");
  if (d.length === 3) {
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return `${parseInt(d[2], 10)} ${months[parseInt(d[1], 10) - 1] || ""}`.trim();
  }
  return w.week_label || w.week_ending || "";
}

// Cost-per-enquiry trend chart. Healthy = under €40 (the operating range for this funnel).
// Note: P2 replaces this with the generalised SVG chart helper; kept here, light-themed, so the page still renders.
function sparkline(weeks, key, unit) {
  const HEALTHY = 40; // €/enquiry: at or below this is a healthy cost for this kind of campaign
  const series = weeks
    .filter(w => w.metrics && typeof w.metrics[key] === "number")
    .map(w => ({ v: w.metrics[key], label: shortWeek(w) }));

  if (series.length < 2) {
    return `<p class="empty">This chart fills in as more weeks are added — you'll see the cost per enquiry move week to week. (${series.length} week so far.)</p>`;
  }

  const vals = series.map(s => s.v);
  const maxV = Math.max(...vals);
  const W = 640, H = 300;
  const padL = 52, padR = 22, padTop = 44, padBot = 56;
  const plotW = W - padL - padR, plotH = H - padTop - padBot;
  // Scale always starts at €0 and always shows the €40 healthy line, with headroom above the highest point.
  const yMax = Math.max(maxV * 1.25, HEALTHY + 12);
  const x = i => padL + (series.length === 1 ? plotW / 2 : i * (plotW / (series.length - 1)));
  const y = v => padTop + plotH * (1 - v / yMax);

  const baseY = y(0), healthyY = y(HEALTHY);
  const pts = series.map((s, i) => [x(i), y(s.v)]);
  const line = pts.map(([px, py]) => `${px.toFixed(1)},${py.toFixed(1)}`).join(" ");

  // Thin labels if the chart ever gets crowded.
  const everyNth = series.length > 8 ? 2 : 1;

  const dots = pts.map(([px, py], i) => {
    const s = series[i];
    const valLbl = `<text x="${px.toFixed(1)}" y="${(py - 14).toFixed(1)}" text-anchor="middle" font-size="17" font-weight="700" fill="#37352f">${unit}${s.v}</text>`;
    const wkLbl = (i % everyNth === 0)
      ? `<text x="${px.toFixed(1)}" y="${(baseY + 26).toFixed(1)}" text-anchor="middle" font-size="14" fill="#787469">${esc(s.label)}</text>`
      : "";
    return `<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="5" fill="#cf9a3a" stroke="#ffffff" stroke-width="2" />${valLbl}${wkLbl}`;
  }).join("");

  const last = series[series.length - 1].v;
  const inHealthy = last <= HEALTHY;

  return `
    <svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Cost per enquiry, week by week. Latest ${unit}${last}.">
      <!-- healthy zone -->
      <rect x="${padL}" y="${healthyY.toFixed(1)}" width="${plotW}" height="${(baseY - healthyY).toFixed(1)}" fill="#6f9f6a" fill-opacity="0.14" />
      <line x1="${padL}" y1="${healthyY.toFixed(1)}" x2="${padL + plotW}" y2="${healthyY.toFixed(1)}" stroke="#6f9f6a" stroke-width="1.5" stroke-dasharray="5 5" />
      <text x="${padL + 6}" y="${(healthyY - 8).toFixed(1)}" font-size="14" fill="#2e6e36" font-weight="600">Healthy zone — under ${unit}${HEALTHY}</text>
      <!-- axis -->
      <line x1="${padL}" y1="${baseY.toFixed(1)}" x2="${padL + plotW}" y2="${baseY.toFixed(1)}" stroke="#d8d5cf" stroke-width="1.5" />
      <text x="${(padL - 10).toFixed(1)}" y="${(healthyY + 5).toFixed(1)}" text-anchor="end" font-size="13" fill="#9a958c">${unit}${HEALTHY}</text>
      <text x="${(padL - 10).toFixed(1)}" y="${(baseY + 5).toFixed(1)}" text-anchor="end" font-size="13" fill="#9a958c">${unit}0</text>
      <!-- trend line -->
      <polyline points="${line}" fill="none" stroke="#cf9a3a" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" />
      ${dots}
    </svg>
    <p class="empty" style="font-style:normal;margin-top:12px;color:#787469;font-size:14px;line-height:1.55;">
      <strong style="color:#37352f;">What this shows:</strong> each dot is one week. It's what we pay in Facebook ads to get one enquiry — <strong style="color:#37352f;">lower is better</strong>.
      As long as the line stays in the green band (under ${unit}${HEALTHY}), the cost is healthy.
      Right now it's at <strong style="color:#37352f;">${unit}${last}</strong>${inHealthy ? ", well inside the healthy range" : ""}.
    </p>`;
}

function render(data) {
  const weeks = data.weeks || [];
  const w = weeks[weeks.length - 1];
  const app = document.getElementById("app");
  if (!w) { app.innerHTML = '<p class="week">No data yet.</p>'; return; }
  const st = STATUS[w.status] || STATUS.measurement;
  const c = w.cards || {};
  const prov = w.status === "measurement";

  app.innerHTML = `
    <p class="brand">Dark Horse · Meta Ads</p>
    <h1>This week's ad performance</h1>
    <p class="week">${esc(w.week_label || w.week_ending)}</p>

    <div class="status ${st.cls}"><span class="dot"></span>${esc(w.status_label || st.label)}</div>

    ${w.headline ? `<div class="headline">${esc(w.headline)}</div>` : ""}

    ${w.video_url ? `<a class="btn-video" href="${esc(w.video_url)}" target="_blank" rel="noopener"><span class="play">▶</span><span>Watch this week's walkthrough <span class="sub">(quick video from Ronan)</span></span></a>` : ""}

    <p class="section-label">The numbers</p>
    <div class="cards">
      <div class="card"><div class="label">Spend</div><div class="value">${esc(c.spend || "—")}</div></div>
      <div class="card"><div class="label">Enquiries</div><div class="value">${esc(c.enquiries || "—")}</div>${c.enquiries_sub ? `<div class="sub">${esc(c.enquiries_sub)}</div>` : ""}</div>
      ${zoneCard("Cost per enquiry", c.cost_per_enquiry, c.cost_per_enquiry_sub, c.cost_per_enquiry_band, c.cost_per_enquiry_band_label, prov, false)}
      ${zoneCard("Click rate", c.click_rate, c.click_rate_sub, c.click_rate_band, c.click_rate_band_label, prov, false)}
      ${zoneCard("Audience freshness", c.audience_freshness, c.audience_freshness_sub, c.audience_freshness_band, c.audience_freshness_band_label, prov, true)}
      <div class="card wide"><div class="label">Best performing ad</div><div class="value">${esc(c.best_ad || "—")}</div></div>
    </div>
    <div class="legend">
      <span><i style="background:#6f9f6a"></i>Good</span>
      <span><i style="background:#caa53d"></i>Keep an eye</span>
      <span><i style="background:#bd312e"></i>Needs attention</span>
      ${prov ? `<span style="font-style:italic">“early” = too soon to be meaningful (week 1)</span>` : ""}
    </div>

    <p class="section-label">Cost per enquiry over time</p>
    <div class="trend">${sparkline(weeks, "cpl", "€")}</div>

    <div class="block">
      <h3><span class="icon">✓</span>What's working</h3>
      <ul>${(w.working || []).map(x => `<li>${esc(x)}</li>`).join("") || "<li>—</li>"}</ul>
    </div>

    <div class="block">
      <h3><span class="icon">!</span>What's not</h3>
      <ul>${(w.not_working || []).map(x => `<li>${esc(x)}</li>`).join("") || "<li>None this week.</li>"}</ul>
    </div>

    <div class="plan">
      <h3>→ The plan</h3>
      <p>${esc(w.next_move || "—")}</p>
    </div>

    <div class="block explainer">
      <h3><span class="icon">?</span>What the colours mean</h3>
      <ul>
        <li><strong>Good</strong> — this is healthy. Keep going, nothing to change.</li>
        <li><strong>Keep an eye</strong> — fine for now, just worth watching. No change yet.</li>
        <li><strong>Needs attention</strong> — something's off. We change one thing (usually the ad, the audience, or the landing page) and give it two weeks before judging.</li>
        <li><strong>“early”</strong> — too soon to read. Week-one numbers bounce around, so we wait before acting.</li>
      </ul>
    </div>

    ${data.sheet_url ? `<a class="sheet-link" href="${esc(data.sheet_url)}" target="_blank" rel="noopener">Want the full detail? Open the numbers sheet →</a>` : ""}

    <footer>
      Updated automatically each week from the Meta Ads dashboard.<br />
      Last updated: ${esc(data.updated || "—")} · Prepared by Ronan.${data.sheet_url ? ` · <a href="${esc(data.sheet_url)}" target="_blank" rel="noopener">Full sheet</a>` : ""}
    </footer>`;
}

// Data is inlined at build time (see build.sh), then the whole page is encrypted with StatiCrypt.
const DATA = __DATA__;
render(DATA);
</script>
</body>
</html>
