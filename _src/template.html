<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Dark Horse — Meta Ads</title>
<style>
  :root {
    /* Light Notion theme */
    --bg: #fbfbfa;          /* off-white page */
    --panel: #ffffff;       /* card / block background */
    --panel-2: #f7f6f4;     /* faint fill */
    --line: #e8e6e1;        /* warm-grey hairline border */
    --text: #37352f;        /* Notion ink */
    --muted: #787469;       /* warm grey */
    --gold-ink: #9a6a06;    /* dark gold — links / brand label (AA on white) */
    --gold-solid: #e6b24e;  /* solid gold — video button fill */
    --brick: #bd312e;
    --green: #6f9f6a;
    --amber: #caa53d;
    --grey: #9a958c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    line-height: 1.55;
    padding: 28px 20px 64px;
    max-width: 760px;
    margin: 0 auto;
  }
  .brand {
    font-size: 12px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--gold-ink);
    font-weight: 600;
    margin-bottom: 6px;
  }
  h1 {
    font-weight: 700;
    font-size: 30px;
    line-height: 1.15;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .week {
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 20px;
  }
  .status {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 15px;
    border: 1px solid var(--line);
    background: var(--panel);
    margin-bottom: 18px;
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; flex: none; }
  .s-measurement .dot { background: var(--grey); }
  .s-ontrack .dot { background: var(--green); }
  .s-watch .dot { background: var(--amber); }
  .s-problem .dot { background: var(--brick); }
  .headline {
    font-size: 17px;
    color: var(--text);
    background: #fbf6ea;
    border: 1px solid var(--line);
    border-left: 4px solid var(--gold-solid);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 22px;
  }
  .btn-video {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    text-decoration: none;
    background: var(--gold-solid); color: #3a2a05;
    font-weight: 700; font-size: 16px;
    padding: 15px 20px; border-radius: 10px;
    margin-bottom: 30px;
  }
  .btn-video .play {
    width: 24px; height: 24px; border-radius: 50%;
    background: #3a2a05; color: var(--gold-solid);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; flex: none;
  }
  .btn-video .sub { font-weight: 500; opacity: .75; font-size: 13px; }
  .section-label {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin: 0 0 12px 2px;
    padding-top: 4px;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  /* Notion-style block: white, soft warm border, rounded, minimal shadow */
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px;
    box-shadow: 0 1px 2px rgba(15, 15, 15, 0.03);
  }
  .card.wide { grid-column: span 2; }
  .card .label {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .card .value {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.015em;
    color: var(--text);
  }
  .card .sub { font-size: 12.5px; color: var(--muted); margin-top: 4px; }
  /* Benchmark reference line: this-vs-4-week-vs-campaign average under a metric card.
     A hairline sets it apart as a "where does this sit against our own baseline" cue.
     Each average carries a colour-band tag (Good / Watch / Needs attention). */
  .card .avg {
    font-size: 13.5px; color: var(--muted); margin-top: 11px; padding-top: 9px;
    border-top: 1px dashed color-mix(in srgb, var(--line) 85%, transparent);
    line-height: 1.9;
  }
  .card.zone .avg { border-top-color: color-mix(in srgb, var(--zb) 30%, transparent); }
  .avg-item { white-space: nowrap; }
  .avg-item strong { font-size: 14.5px; font-weight: 700; }
  .avg-sep { color: var(--grey); margin: 0 8px; }
  .avg-tag {
    display: inline-block; margin-left: 5px; vertical-align: baseline;
    font-size: 11px; font-weight: 700; letter-spacing: 0.01em;
    padding: 1px 8px; border-radius: 999px; border: 1px solid;
  }

  /* Zone-coded cards — soft wash + coloured left border + icon + text label.
     Colour is never the only cue: border + icon shape + word label all carry the zone. */
  .card.zone {
    background: var(--zbg);
    border: 1px solid color-mix(in srgb, var(--zb) 40%, var(--line));
    border-left: 4px solid var(--zb);
  }
  .card.zone .value { color: var(--zc); }      /* number in zone colour (AA on wash) */
  .card.zone .label { color: color-mix(in srgb, var(--zc) 70%, var(--muted)); }
  .zone-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .zone-icon {
    width: 18px; height: 18px; border-radius: 5px; flex: none;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; line-height: 1;
    background: var(--zb); color: #fff;
  }
  .zone-label {
    display: inline-flex; align-items: center;
    margin-top: 10px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.01em;
    color: var(--zc);
  }
  .zone-label.early { opacity: 0.7; font-weight: 600; }
  /* Provisional flag on a card whose colour target has no data behind it yet. */
  .prov {
    margin-top: 10px;
    font-size: 12px; font-weight: 600; line-height: 1.35;
    color: #8a6400;
  }
  /* Divider before the weekly detail, under the monthly/all-time summary. */
  .view-rule {
    border: 0; border-top: 1px solid var(--line);
    margin: 8px 0 26px;
  }
  .legend {
    display: flex; flex-wrap: wrap; gap: 14px;
    margin: -12px 2px 30px;
    font-size: 12px; color: var(--muted);
  }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .legend i { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .trend {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 30px;
    box-shadow: 0 1px 2px rgba(15, 15, 15, 0.03);
  }
  .trend .empty { color: var(--muted); font-size: 14px; font-style: italic; }
  .block { margin-bottom: 26px; }
  .explainer {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px 18px 10px;
    margin-bottom: 30px;
  }
  .explainer h3 { font-size: 16px; color: var(--text); }
  .explainer li { font-size: 14.5px; color: var(--muted); }
  .explainer li strong { color: var(--text); }
  .block h3 {
    font-weight: 700;
    font-size: 19px;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 9px;
  }
  .block h3 .icon { font-size: 16px; }
  .block ul { list-style: none; }
  .block li {
    position: relative;
    padding-left: 18px;
    margin-bottom: 9px;
    color: #4a463e;
    font-size: 15.5px;
  }
  .block li::before {
    content: "";
    position: absolute; left: 0; top: 10px;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold-solid);
  }
  .plan {
    background: #fbf6ea;
    border: 1px solid var(--line);
    border-left: 4px solid var(--gold-solid);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 34px;
  }
  .plan h3 { color: var(--gold-ink); }
  .plan p { font-size: 16px; }
  footer {
    border-top: 1px solid var(--line);
    padding-top: 16px;
    color: var(--muted);
    font-size: 12.5px;
    line-height: 1.6;
  }
  footer a { color: var(--gold-ink); text-decoration: none; font-weight: 600; }
  .sheet-link {
    display: inline-block;
    margin-bottom: 22px;
    color: var(--gold-ink); text-decoration: none; font-weight: 600; font-size: 14.5px;
    border-bottom: 1px solid color-mix(in srgb, var(--gold-ink) 40%, transparent);
    padding-bottom: 2px;
  }
  svg { display: block; width: 100%; height: auto; overflow: visible; }

  /* Week-ending picker (top of page) */
  .toolbar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    margin-bottom: 20px;
  }
  .toolbar label { font-size: 13px; color: var(--muted); font-weight: 600; }
  #week-select {
    font: inherit; font-size: 14.5px; color: var(--text);
    background: var(--panel);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 9px 34px 9px 13px; cursor: pointer;
    appearance: none; -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' fill='none' stroke='%23787469' stroke-width='1.6' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat; background-position: right 12px center;
    box-shadow: 0 1px 2px rgba(15, 15, 15, 0.03);
  }
  #week-select:focus-visible { outline: 2px solid var(--gold-ink); outline-offset: 2px; }

  /* Top-level view tabs — switch between the weekly report and the 4-week cycle report */
  .tabs {
    display: flex; gap: 6px; margin: 6px 0 10px;
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 11px; padding: 4px;
  }
  .tab {
    flex: 1; font: inherit; font-size: 14px; font-weight: 600;
    color: var(--muted); background: transparent;
    border: 0; border-radius: 8px; padding: 10px 8px; cursor: pointer;
    appearance: none; -webkit-appearance: none; text-align: center;
    transition: background .12s ease, color .12s ease;
  }
  .tab[aria-selected="true"] {
    background: var(--gold-ink); color: #ffffff;
    box-shadow: 0 1px 2px rgba(15, 15, 15, 0.08);
  }
  .tab:focus-visible { outline: 2px solid var(--gold-ink); outline-offset: 2px; }
  .view-caption {
    margin: 0 0 20px; color: var(--muted); font-size: 12.5px; font-style: italic;
  }

  /* Ranked primary-metric cards (monthly view) */
  .rank-badge {
    display: inline-block; margin-bottom: 8px;
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--muted); background: var(--panel-2);
    border: 1px solid var(--line); border-radius: 999px; padding: 2px 9px;
  }
  .rank-badge.rank-1 { color: #8a5a00; background: #fbf3e0; border-color: #e9dcc0; }
  .rank-hint { font-weight: 400; color: var(--muted); font-size: 12px; text-transform: none; letter-spacing: 0; }
  ul.mini-funnel {
    margin: 0; padding: 4px 0 0 0; list-style: none;
    font-size: 13.5px; line-height: 1.7; color: var(--text);
  }
  ul.mini-funnel li { padding: 1px 0; }
  .plan ul { margin: 12px 0 0; padding-left: 20px; }
  .plan li { margin: 5px 0; line-height: 1.55; }
  .plan .plan-sub { margin: 4px 0 0; font-size: 13px; color: var(--muted); }

  /* Numeric cards are real <button> controls (click-to-expand). Reset native button chrome. */
  button.card {
    font: inherit; text-align: left; width: 100%;
    color: var(--text); cursor: pointer; display: block;
    appearance: none; -webkit-appearance: none;
  }
  button.card:focus-visible { outline: 2px solid var(--gold-ink); outline-offset: 2px; }
  .expand-hint {
    display: inline-block; margin-top: 10px; color: var(--muted);
    font-size: 12px; line-height: 1;
  }
  .hint-arrow { display: inline-block; transition: transform .15s ease; }
  button.card[aria-expanded="true"] .expand-hint .hint-arrow { transform: rotate(180deg); }
  .card-panel {
    margin-top: 14px; padding-top: 12px;
    border-top: 1px solid color-mix(in srgb, var(--line) 80%, transparent);
  }
  .card-panel[hidden] { display: none; }

  @media (max-width: 420px) {
    h1 { font-size: 26px; }
    .card .value { font-size: 24px; }
    #week-select { width: 100%; }
  }
</style>
</head>
<body>
  <div id="app">
    <p class="week">Loading…</p>
  </div>

<script>
const STATUS = {
  measurement: { cls: "s-measurement", label: "Measurement window" },
  ontrack:     { cls: "s-ontrack",     label: "On track" },
  watch:       { cls: "s-watch",       label: "Watch" },
  problem:     { cls: "s-problem",     label: "Problem" }
};

function el(html) { const t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstChild; }
function esc(s) { return String(s).replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c])); }

// Zone bands. Each carries: text/number colour (tc, AA on its wash), wash bg, border colour (bc),
// and a distinct icon SHAPE — so the zone reads from border + shape + word label, never hue alone.
const BANDS = {
  great: { t: "Great",            tc: "#2e6e36", bg: "#edf5ec", bc: "#6f9f6a", icon: "✓" },
  good:  { t: "Good",             tc: "#2e6e36", bg: "#edf5ec", bc: "#6f9f6a", icon: "✓" },
  watch: { t: "Watch",            tc: "#8a6400", bg: "#fbf3e0", bc: "#caa53d", icon: "◆" },
  high:  { t: "Running high",     tc: "#9c4a1a", bg: "#fbeede", bc: "#d98a4a", icon: "▲" },
  low:   { t: "Running low",      tc: "#9c4a1a", bg: "#fbeede", bc: "#d98a4a", icon: "▼" },
  poor:  { t: "Needs attention",  tc: "#b22b27", bg: "#fbeceb", bc: "#bd312e", icon: "!" }
};

// Metric configs drive the one chart helper. unit/format handle € vs % vs count vs ×.
// metricKey maps each card to its per-week numeric series in weeks[].metrics.
const METRICS = {
  cpl:       { key: "cpl",       label: "Cost per enquiry",  unit: "€", format: "money",   lowerIsBetter: true  },
  ctr:       { key: "ctr",       label: "Click rate",        unit: "%", format: "percent", lowerIsBetter: false },
  frequency: { key: "frequency", label: "Audience freshness",unit: "×", format: "freq",    lowerIsBetter: true  },
  spend:     { key: "spend",     label: "Spend",             unit: "€", format: "money",   lowerIsBetter: false },
  enquiries: { key: "enquiries", label: "Enquiries",         unit: "",  format: "count",   lowerIsBetter: false }
};

// --- Benchmark averages (this week vs 4-week vs campaign) ----------------------
// Pure arithmetic over the raw per-week metrics (no thresholds live here — same as
// the 4-week total already computed in monthlyTrend). Each aggregator returns a
// formatted string for a slice of weeks, or null when undefined (e.g. 0 enquiries →
// no cost-per-enquiry). Rates are correctly weighted, never a naive mean of weekly
// rates, so a 0-lead or low-volume week can't distort the average.
function mv(w, k) { return (w.metrics && typeof w.metrics[k] === "number") ? w.metrics[k] : undefined; }
function sumK(ws, k) { return ws.reduce((a, w) => a + (mv(w, k) || 0), 0); }

// Each aggregator returns { v: number, str: displayString } or null when undefined.
const AVG_AGG = {
  // Cost per enquiry = total spend ÷ total enquiries over the window (spend-weighted).
  cpl: ws => { const l = sumK(ws, "enquiries"); if (l <= 0) return null; const v = sumK(ws, "spend") / l; return { v, str: "€" + Math.round(v) }; },
  // Click rate = total clicks ÷ total impressions (impression-weighted).
  ctr: ws => { const i = sumK(ws, "impressions"); if (i <= 0) return null; const v = sumK(ws, "clicks") / i * 100; return { v, str: v.toFixed(1) + "%" }; },
  // Audience freshness = mean of the weekly frequency readings (reach can't sum across
  // weeks without double-counting the same people, so a simple mean is the honest number).
  frequency: ws => { const f = ws.map(w => mv(w, "frequency")).filter(x => typeof x === "number" && x > 0); if (!f.length) return null; const v = f.reduce((a, b) => a + b, 0) / f.length; return { v, str: v.toFixed(1) + "×" }; }
};

// Colour-band tag styling per zone-array key (green/amber/red → matches the page legend,
// non-colour cue = the word). Text/border colours are the AA-safe ones from BANDS.
const AVG_TIER = {
  green: { tc: "#2e6e36", bg: "#edf5ec", bc: "#6f9f6a", word: "Good" },
  amber: { tc: "#8a6400", bg: "#fbf3e0", bc: "#caa53d", word: "Watch" },
  red:   { tc: "#b22b27", bg: "#fbeceb", bc: "#bd312e", word: "Needs attention" }
};

// Which zone-array band a numeric value lands in, via the same value<=max walk the trend
// uses (direction is baked into each array's order, so this works for cpl/ctr/frequency).
function tierFor(metricKey, v) {
  const bands = bandsFor(metricKey);
  if (!bands || typeof v !== "number") return null;
  const hit = bands.find(b => b.max == null || v <= b.max) || bands[bands.length - 1];
  return AVG_TIER[hit && hit.key] || null;
}

// One "<label> <value> <tag>" chunk, value + tag coloured by the band the value sits in.
function avgItem(label, agg, metricKey) {
  const t = tierFor(metricKey, agg.v);
  const vc = t ? ` style="color:${t.tc}"` : "";
  const tag = t ? ` <span class="avg-tag" style="color:${t.tc};background:${t.bg};border-color:${t.bc}">${esc(t.word)}</span>` : "";
  return `<span class="avg-item">${esc(label)} <strong${vc}>${esc(agg.str)}</strong>${tag}</span>`;
}

// Build the "4-wk avg X [tag] · campaign avg Y [tag]" reference line for a metric, computed
// over history up to and including the selected week (so it stays correct for any week picked).
function avgLine(metricKey, upToIdx) {
  const agg = AVG_AGG[metricKey];
  if (!agg) return "";
  const hist = WEEKS.slice(0, upToIdx + 1);
  if (hist.length < 2) return ""; // nothing to compare a single week against yet
  const last4 = hist.slice(-4);
  const a4 = agg(last4), aAll = agg(hist);
  const parts = [];
  if (a4) parts.push(avgItem(`${last4.length}-wk avg`, a4, metricKey));
  if (aAll && hist.length > last4.length) parts.push(avgItem("campaign avg", aAll, metricKey));
  return parts.join(`<span class="avg-sep">·</span>`);
}

// Zone bands per metric, passed in via data (never hardcoded thresholds in this repo).
// Quality metrics (cost/click/freshness) get bands so the card shows "where it should be".
// Volume metrics (spend, enquiries) have no good/bad zone, so no bands.
function bandsFor(metricKey) {
  if (!DATA) return null;
  if (metricKey === "cpl")       return DATA.cpl_bands || null;
  if (metricKey === "ctr")       return DATA.ctr_bands || null;
  if (metricKey === "frequency") return DATA.frequency_bands || null;
  return null;
}

const LINE = "#cf9a3a";       // gold trend/series line
const SEL_DOT = "#cf9a3a";    // emphasised (selected) point
const DIM_DOT = "#d8b878";    // earlier points

// ---- single application state -------------------------------------------------
let DATA = null;
let WEEKS = [];
let selectedIndex = 0;
let activeView = "weekly"; // "weekly" (this week) | "monthly" (last 4 weeks / cycle)

function shortWeek(w) {
  // "2026-06-21" -> "21 Jun"
  const d = (w.week_ending || "").split("-");
  if (d.length === 3) {
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return `${parseInt(d[2], 10)} ${months[parseInt(d[1], 10) - 1] || ""}`.trim();
  }
  return w.week_label || w.week_ending || "";
}

// Format a metric value for display, by unit/format. Single source so card + chart agree.
function fmtVal(cfg, v) {
  if (typeof v !== "number" || !isFinite(v)) return "—";
  if (cfg.format === "money")   return cfg.unit + v.toFixed(2);
  if (cfg.format === "percent") return v + "%";
  if (cfg.format === "freq")    return v.toFixed(1) + cfg.unit;
  if (cfg.format === "count")   return String(v);
  return cfg.unit + v;
}
// Shorter label for an axis bound.
function fmtAxis(cfg, v) {
  if (cfg.format === "money")   return cfg.unit + (Number.isInteger(v) ? v : v.toFixed(0));
  if (cfg.format === "percent") return v + "%";
  if (cfg.format === "freq")    return v.toFixed(1) + cfg.unit;
  return String(v);
}

// Pull the numeric series for a metric across a slice of weeks. Tracks gaps so the
// chart can render the points it HAS and label the missing ones rather than blanking.
function buildSeries(slice, key) {
  const pts = [];
  let gaps = 0;
  slice.forEach((w, i) => {
    const v = w.metrics ? w.metrics[key] : undefined;
    if (typeof v === "number" && isFinite(v)) pts.push({ v, label: shortWeek(w), idx: i });
    else gaps++;
  });
  return { pts, gaps, total: slice.length };
}

// THE chart helper — hand-rolled inline SVG, no dependency. Drives every chart.
// Handles null/zero/single-point, gaps, optional zone bands, and selected-point highlight.
// opts: { pts, gaps, cfg, selectedIdx, bands, mini, aria }
function svgChart(opts) {
  const { pts, gaps = 0, cfg, selectedIdx, bands = null, mini = false, aria = "" } = opts;
  const W = mini ? 320 : 640, H = mini ? 170 : 300;
  const padL = mini ? 36 : 52, padR = mini ? 16 : 22;
  const padTop = mini ? 26 : 44, padBot = mini ? 38 : 56;
  const plotW = W - padL - padR, plotH = H - padTop - padBot;

  if (!pts || pts.length === 0) {
    return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="${esc(aria || "No data yet")}"><text x="${W / 2}" y="${H / 2}" text-anchor="middle" font-size="14" fill="#787469">No data yet</text></svg>`;
  }

  const vals = pts.map(p => p.v);
  const dataMax = Math.max(...vals);
  let yMax;
  if (bands) {
    const finite = bands.filter(b => b.max != null).map(b => b.max);
    const lastFinite = finite.length ? Math.max(...finite) : dataMax;
    yMax = Math.max(lastFinite * 1.2, dataMax * 1.1); // red band sits above the amber bound
  } else {
    yMax = dataMax > 0 ? dataMax * 1.25 : 1;
  }
  const n = pts.length;
  const xAt = i => padL + (n === 1 ? plotW / 2 : i * (plotW / (n - 1)));
  const yAt = v => padTop + plotH * (1 - Math.max(0, Math.min(v, yMax)) / yMax);
  const baseY = yAt(0);

  // Zone bands (trend only): faint fills stacked low→high; final band (max:null) fills to yMax.
  let bandRects = "";
  if (bands) {
    let lower = 0;
    bands.forEach(b => {
      const upper = (b.max == null) ? yMax : b.max;
      if (upper > lower) {
        const yTop = yAt(upper), yBot = yAt(lower);
        bandRects += `<rect x="${padL}" y="${yTop.toFixed(1)}" width="${plotW}" height="${(yBot - yTop).toFixed(1)}" fill="${b.color}" fill-opacity="0.13" />`;
        if (b.max != null) {
          bandRects += `<line x1="${padL}" y1="${yTop.toFixed(1)}" x2="${(padL + plotW).toFixed(1)}" y2="${yTop.toFixed(1)}" stroke="${b.color}" stroke-width="1" stroke-dasharray="4 4" stroke-opacity="0.65" />`;
          bandRects += `<text x="${(padL - 8).toFixed(1)}" y="${(yTop + 4).toFixed(1)}" text-anchor="end" font-size="12" fill="#9a958c">${esc(fmtAxis(cfg, b.max))}</text>`;
        }
      }
      lower = (b.max == null) ? yMax : b.max;
    });
  }

  const coords = pts.map((p, i) => ({ x: xAt(i), y: yAt(p.v), p }));
  const line = (n >= 2)
    ? `<polyline points="${coords.map(c => `${c.x.toFixed(1)},${c.y.toFixed(1)}`).join(" ")}" fill="none" stroke="${LINE}" stroke-width="${mini ? 2.5 : 3}" stroke-linejoin="round" stroke-linecap="round" />`
    : "";

  // Thin x-labels if it ever crowds.
  const everyNth = n > 8 ? Math.ceil(n / 8) : 1;
  const dots = coords.map((c, i) => {
    const isSel = c.p.idx === selectedIdx;
    const r = isSel ? (mini ? 5 : 7) : (mini ? 3.5 : 5);
    const ring = isSel ? `<circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="${r + 3}" fill="none" stroke="${SEL_DOT}" stroke-opacity="0.35" stroke-width="2" />` : "";
    const valLbl = `<text x="${c.x.toFixed(1)}" y="${(c.y - (mini ? 9 : 14)).toFixed(1)}" text-anchor="middle" font-size="${mini ? (isSel ? 15 : 13) : 17}" font-weight="${isSel ? 700 : 600}" fill="${isSel ? "#37352f" : "#787469"}">${esc(fmtVal(cfg, c.p.v))}</text>`;
    const wkLbl = (i % everyNth === 0)
      ? `<text x="${c.x.toFixed(1)}" y="${(baseY + (mini ? 18 : 26)).toFixed(1)}" text-anchor="middle" font-size="${mini ? 12 : 14}" font-weight="${isSel ? 700 : 400}" fill="#787469">${esc(c.p.label)}</text>`
      : "";
    return `${ring}<circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="${r}" fill="${isSel ? SEL_DOT : DIM_DOT}" stroke="#ffffff" stroke-width="2" />${valLbl}${wkLbl}`;
  }).join("");

  const axis = `<line x1="${padL}" y1="${baseY.toFixed(1)}" x2="${(padL + plotW).toFixed(1)}" y2="${baseY.toFixed(1)}" stroke="#d8d5cf" stroke-width="1.5" />`;
  const gapNote = gaps > 0
    ? `<text x="${padL}" y="${(padTop - 8).toFixed(1)}" font-size="12" fill="#9a958c">${gaps} earlier week${gaps > 1 ? "s" : ""} had no value</text>`
    : "";

  return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="${esc(aria)}">${bandRects}${axis}${line}${dots}${gapNote}</svg>`;
}

// Inner content shared by static and button-wrapped cards (zone or neutral).
// `avg` is pre-built HTML (our own numbers, safe) — the benchmark reference line.
function cardInner(label, value, sub, band, bandLabel, provisional, avg) {
  const avgHtml = avg ? `<div class="avg">${avg}</div>` : "";
  const b = band ? BANDS[band] : null;
  if (b) {
    const word = (bandLabel || b.t) + (provisional ? " · early" : "");
    return {
      zoneCls: " zone",
      style: `--zc:${b.tc};--zbg:${b.bg};--zb:${b.bc}`,
      html: `<div class="zone-head"><span class="zone-icon" aria-hidden="true">${b.icon}</span><span class="label">${esc(label)}</span></div>
        <div class="value">${esc(value || "—")}</div>
        ${sub ? `<div class="sub">${esc(sub)}</div>` : ""}
        <div class="zone-label${provisional ? " early" : ""}">${esc(word)}</div>
        ${avgHtml}`
    };
  }
  return {
    zoneCls: "",
    style: "",
    html: `<div class="label">${esc(label)}</div><div class="value">${esc(value || "—")}</div>${sub ? `<div class="sub">${esc(sub)}</div>` : ""}${avgHtml}`
  };
}

// A numeric metric card: a real <button> that expands to an inline mini-graph of its
// series over weeks.slice(0, selectedIndex+1). Hides the expand control when no current value.
function metricCard(o) {
  const { label, value, sub, band, bandLabel, provisional, wide, metricKey, avg } = o;
  const inner = cardInner(label, value, sub, band, bandLabel, provisional, avg);
  const wideCls = wide ? " wide" : "";
  const slice = WEEKS.slice(0, selectedIndex + 1);
  const series = buildSeries(slice, metricKey);
  const hasValue = value != null && value !== "" && series.pts.length >= 1;

  // No current value → plain, non-interactive card with no expand control (render fallback).
  if (!hasValue) {
    return `<div class="card${inner.zoneCls}${wideCls}"${inner.style ? ` style="${inner.style}"` : ""}>${inner.html}</div>`;
  }

  const cfg = METRICS[metricKey];
  const panelId = `panel-${metricKey}`;
  const aria = `${label} over ${series.pts.length} week${series.pts.length > 1 ? "s" : ""}`;
  const svg = svgChart({ pts: series.pts, gaps: series.gaps, cfg, selectedIdx: selectedIndex, bands: bandsFor(metricKey), mini: true, aria });

  return `<button type="button" class="card metric-card${inner.zoneCls}${wideCls}" data-metric="${metricKey}" aria-expanded="false" aria-controls="${panelId}"${inner.style ? ` style="${inner.style}"` : ""}>
      ${inner.html}
      <span class="expand-hint" aria-hidden="true"><span class="hint-arrow">▾</span> details</span>
      <div class="card-panel" id="${panelId}" hidden>${svg}</div>
    </button>`;
}

// Cost-per-enquiry trend with cpl_bands zone bands behind the line, over the selected history.
function trendChart() {
  const slice = WEEKS.slice(0, selectedIndex + 1);
  const bands = (DATA && DATA.cpl_bands) || null;
  const cfg = METRICS.cpl;
  const s = buildSeries(slice, "cpl");

  if (s.pts.length === 0) {
    return `<p class="empty">This chart fills in as weeks are added — you'll see the cost per enquiry move week to week.</p>`;
  }

  const aria = `Cost per enquiry over ${s.pts.length} week${s.pts.length > 1 ? "s" : ""}`;
  const svg = svgChart({ pts: s.pts, gaps: s.gaps, cfg, selectedIdx: selectedIndex, bands, mini: false, aria });

  const last = s.pts[s.pts.length - 1].v;
  let zoneWord = "the high zone";
  if (bands) {
    const hit = bands.find(b => b.max == null || last <= b.max) || bands[bands.length - 1];
    zoneWord = hit.key === "green" ? "the healthy zone" : hit.key === "amber" ? "the watch zone" : "the high zone";
  }

  return `${svg}
    <p class="empty" style="font-style:normal;margin-top:12px;color:#787469;font-size:14px;line-height:1.55;">
      <strong style="color:#37352f;">What this shows:</strong> each dot is one week — what we pay in Facebook ads to get one enquiry, and <strong style="color:#37352f;">lower is better</strong>.
      The bands behind the line are the zones: green is healthy, amber is worth watching, red is too high.
      Right now it's <strong style="color:#37352f;">${esc(fmtVal(cfg, last))}</strong>, sitting in ${zoneWord}.
    </p>`;
}

// A static (non-interactive) card: optional zone band + optional provisional flag.
// Used by the monthly cycle funnel + the all-time cards, which are cycle-level
// (not per-week) so they never expand into a weekly mini-chart.
function bandStaticCard(o) {
  const inner = cardInner(o.label, o.value, o.sub, o.band || null, o.band_label || null, false);
  const wideCls = o.wide ? " wide" : "";
  const prov = o.provisional
    ? `<div class="prov">⚠ Provisional — no benchmark behind the colour yet. Re-pin at Day 60.</div>`
    : "";
  return `<div class="card${inner.zoneCls}${wideCls}"${inner.style ? ` style="${inner.style}"` : ""}>${inner.html}${prov}</div>`;
}

// "Current 4-week cycle" view — mirrors the Conor monthly summary: status light,
// cycle start/end label (never a month name), funnel cards, next-cycle priority.
function renderCycle() {
  const cy = DATA.current_cycle;
  if (!cy) return "";
  const st = STATUS[cy.status] || STATUS.ontrack;
  const funnel = (cy.funnel || []).map(f => bandStaticCard(f)).join("");
  return `
    <p class="section-label">Current 4-week cycle</p>
    <p class="week">${esc(cy.cycle_label || "")}</p>
    <div class="status ${st.cls}"><span class="dot"></span>${esc(cy.status_label || st.label)}</div>
    ${cy.headline ? `<div class="headline">${esc(cy.headline)}</div>` : ""}
    <div class="cards">${funnel}</div>
    ${cy.priority ? `<div class="plan"><h3>→ Next cycle</h3><p>${esc(cy.priority)}</p></div>` : ""}`;
}

// Standing "since launch (all-time)" cards — CAC (banded) + booking/conversion
// (provisional, no colour target yet). Grows as the Lead Log fills.
function renderAllTime() {
  const at = DATA.all_time;
  if (!at || !Array.isArray(at.cards) || at.cards.length === 0) return "";
  const cards = at.cards.map(c => bandStaticCard(c)).join("");
  return `
    <p class="section-label">Since launch (all-time)</p>
    <div class="cards">${cards}</div>
    ${at.note ? `<div class="legend"><span style="font-style:italic">${esc(at.note)}</span></div>` : ""}
    <hr class="view-rule" />`;
}

// "This week" view — the weekly report: week picker, headline, the numbers,
// trend, and working / not-working / plan for the selected week.
function renderWeekly() {
  const w = WEEKS[selectedIndex];
  if (!w) return '<p class="week">No weekly data yet.</p>';
  const st = STATUS[w.status] || STATUS.measurement;
  const c = w.cards || {};
  const prov = w.status === "measurement";

  const options = WEEKS.map((wk, i) =>
    `<option value="${i}"${i === selectedIndex ? " selected" : ""}>${esc(wk.week_label || shortWeek(wk))}</option>`
  ).join("");

  return `
    <h1>This week's ad performance</h1>
    <p class="view-caption">One closed week at a time. Small numbers, so we read the trend, not a single week.</p>
    <div class="toolbar">
      <label for="week-select">Week ending</label>
      <select id="week-select" aria-label="Choose which week to view">${options}</select>
    </div>
    <p class="week">${esc(w.week_label || w.week_ending)}</p>

    <div class="status ${st.cls}"><span class="dot"></span>${esc(w.status_label || st.label)}</div>

    ${w.headline ? `<div class="headline">${esc(w.headline)}</div>` : ""}

    ${w.video_url ? `<a class="btn-video" href="${esc(w.video_url)}" target="_blank" rel="noopener"><span class="play">▶</span><span>Watch this week's walkthrough <span class="sub">(quick video from Ronan)</span></span></a>` : ""}

    <p class="section-label">The numbers</p>
    <div class="cards">
      ${metricCard({ label: "Spend", value: c.spend, metricKey: "spend" })}
      ${metricCard({ label: "Enquiries", value: c.enquiries, sub: c.enquiries_sub, metricKey: "enquiries" })}
      ${metricCard({ label: "Cost per enquiry", value: c.cost_per_enquiry, sub: c.cost_per_enquiry_sub, band: c.cost_per_enquiry_band, bandLabel: c.cost_per_enquiry_band_label, provisional: prov, metricKey: "cpl", avg: avgLine("cpl", selectedIndex) })}
      ${metricCard({ label: "Click rate", value: c.click_rate, sub: c.click_rate_sub, band: c.click_rate_band, bandLabel: c.click_rate_band_label, provisional: prov, metricKey: "ctr", avg: avgLine("ctr", selectedIndex) })}
      ${metricCard({ label: "Audience freshness", value: c.audience_freshness, sub: c.audience_freshness_sub, band: c.audience_freshness_band, bandLabel: c.audience_freshness_band_label, provisional: prov, wide: true, metricKey: "frequency", avg: avgLine("frequency", selectedIndex) })}
      ${c.cac ? metricCard({ label: "Cost per member so far (CAC)", value: c.cac, sub: c.cac_sub, band: c.cac_band, bandLabel: c.cac_band_label, wide: true, metricKey: "cac" }) : ""}
      <div class="card wide"><div class="label">Best performing ad</div><div class="value">${esc(c.best_ad || "—")}</div></div>
    </div>
    <div class="legend">
      <span><i style="background:#6f9f6a"></i>Good</span>
      <span><i style="background:#caa53d"></i>Keep an eye</span>
      <span><i style="background:#bd312e"></i>Needs attention</span>
      ${prov ? `<span style="font-style:italic">“early” = too soon to be meaningful (week 1)</span>` : ""}
    </div>

    <p class="section-label">Cost per enquiry over time</p>
    <div class="trend">${trendChart()}</div>

    <div class="block">
      <h3><span class="icon">✓</span>What's working</h3>
      <ul>${(w.working || []).map(x => `<li>${esc(x)}</li>`).join("") || "<li>—</li>"}</ul>
    </div>

    <div class="block">
      <h3><span class="icon">!</span>What's not</h3>
      <ul>${(w.not_working || []).map(x => `<li>${esc(x)}</li>`).join("") || "<li>None this week.</li>"}</ul>
    </div>

    <div class="plan">
      <h3>→ The plan</h3>
      <p>${esc(w.next_move || "—")}</p>
    </div>`;
}

// A ranked primary-metric card (monthly view). Clickable → expands into the
// last-4-weeks mini-graph for metrics that have a weekly series (seriesKey), or a
// short funnel breakdown for cumulative metrics like CAC (breakdown, no series).
function monthlyCard(p, slice) {
  const inner = cardInner(p.label, p.value, p.sub, p.band || null, p.band_label || null, false);
  const badge = p.rank ? `<span class="rank-badge rank-${p.rank}">#${p.rank} · ${esc(p.role || "")}</span>` : "";
  const wideCls = p.wide ? " wide" : "";
  const id = p.rank || p.seriesKey || "x";

  let panel = "";
  if (p.seriesKey) {
    const series = buildSeries(slice, p.seriesKey);
    if (series.pts.length >= 1) {
      const cfg = METRICS[p.seriesKey];
      // selectedIdx:-1 → no week highlighted; this is the cycle view, not a single week.
      panel = svgChart({ pts: series.pts, gaps: series.gaps, cfg, selectedIdx: -1, bands: bandsFor(p.seriesKey), mini: true, aria: `${p.label} over the last ${series.pts.length} weeks` });
    }
  } else if (Array.isArray(p.breakdown) && p.breakdown.length) {
    panel = `<ul class="mini-funnel">${p.breakdown.map(x => `<li>${esc(x)}</li>`).join("")}</ul>`;
  }

  if (!panel) {
    return `<div class="card${inner.zoneCls}${wideCls}"${inner.style ? ` style="${inner.style}"` : ""}>${badge}${inner.html}</div>`;
  }
  const panelId = `mpanel-${id}`;
  return `<button type="button" class="card metric-card${inner.zoneCls}${wideCls}" aria-expanded="false" aria-controls="${panelId}"${inner.style ? ` style="${inner.style}"` : ""}>
      ${badge}${inner.html}
      <span class="expand-hint" aria-hidden="true"><span class="hint-arrow">▾</span> last 4 weeks</span>
      <div class="card-panel" id="${panelId}" hidden>${panel}</div>
    </button>`;
}

// Cycle trendline — cost per enquiry across the last 4 weeks, with the cycle totals
// (the "month total") stated beneath. Reuses the same zoned SVG as the weekly trend.
function monthlyTrend(slice) {
  const bands = (DATA && DATA.cpl_bands) || null;
  const cfg = METRICS.cpl;
  const s = buildSeries(slice, "cpl");
  if (s.pts.length === 0) return `<p class="empty">This fills in as the cycle's weeks are added.</p>`;
  const svg = svgChart({ pts: s.pts, gaps: s.gaps, cfg, selectedIdx: -1, bands, mini: false, aria: `Cost per enquiry across the last ${s.pts.length} weeks` });

  const totSpend = slice.reduce((a, w) => a + ((w.metrics && w.metrics.spend) || 0), 0);
  const totLeads = slice.reduce((a, w) => a + ((w.metrics && w.metrics.enquiries) || 0), 0);
  const avg = totLeads ? totSpend / totLeads : null;
  const totalLine = `<strong style="color:#37352f;">4-week total:</strong> €${totSpend.toFixed(0)} spent · ${totLeads} enquiries · ${avg != null ? "€" + avg.toFixed(0) + " average cost each" : "—"}.`;

  return `${svg}
    <p class="empty" style="font-style:normal;margin-top:12px;color:#787469;font-size:14px;line-height:1.55;">
      ${totalLine} Each dot is one week — what we pay in Facebook ads to get one enquiry, and <strong style="color:#37352f;">lower is better</strong>. Green is healthy, amber is worth watching, red is too high.
    </p>`;
}

// "Last 4 weeks" view — the monthly / 4-week-cycle report. Leads with the ranked
// metrics that matter (CAC → Leads → CPL → Spend, each click-to-expand into its last
// 4 weeks), then the cycle trendline, the trial funnel, and the since-launch cards.
function renderMonthly() {
  const cy = DATA.current_cycle;
  if (!cy) {
    return `<h1>Last 4 weeks</h1><p class="week">No cycle data yet — this fills in once a full 4-week cycle has closed.</p>`;
  }
  const st = STATUS[cy.status] || STATUS.ontrack;
  const slice = WEEKS.slice(-4); // the last 4 weeks = the current cycle

  const primary = (cy.primary || []).map(p => monthlyCard(p, slice)).join("");
  const creative = (cy.creative || []).map(p => monthlyCard(p, slice)).join("");

  // Trial-funnel cards = the funnel items NOT already promoted to the ranked row.
  const promoted = ["spend", "enquir", "cost per enquiry"];
  const secondary = (cy.funnel || [])
    .filter(f => !promoted.some(k => (f.label || "").toLowerCase().includes(k)))
    .map(f => bandStaticCard(f)).join("");

  return `
    <h1>Last 4 weeks</h1>
    <p class="view-caption">The bigger picture — a full 4-week cycle, steadier than any single week. Tap any metric for its last-4-weeks detail.</p>
    <p class="week">${esc(cy.cycle_label || "")}</p>
    <div class="status ${st.cls}"><span class="dot"></span>${esc(cy.status_label || st.label)}</div>
    ${cy.headline ? `<div class="headline">${esc(cy.headline)}</div>` : ""}

    ${primary ? `<p class="section-label">The metrics that matter <span class="rank-hint">— ranked by importance · tap any for the last 4 weeks</span></p>
    <div class="cards">${primary}</div>` : ""}

    <p class="section-label">Cost per enquiry across the cycle</p>
    <div class="trend">${monthlyTrend(slice)}</div>

    ${creative ? `<p class="section-label">The creative <span class="rank-hint">— is the ad wearing out? · tap for the last 4 weeks</span></p>
    <div class="cards">${creative}</div>` : ""}

    ${secondary ? `<p class="section-label">The trial funnel</p>
    <div class="cards">${secondary}</div>` : ""}

    ${renderAllTime()}

    ${(cy.priority || (cy.next_actions && cy.next_actions.length)) ? `<div class="plan">
      <h3>→ ${esc(cy.next_title || "What we're proposing next")}</h3>
      ${cy.priority ? `<p>${esc(cy.priority)}</p>` : ""}
      ${(cy.next_actions && cy.next_actions.length) ? `<ul>${cy.next_actions.map(a => `<li>${esc(a)}</li>`).join("")}</ul>` : ""}
      ${cy.next_note ? `<p class="plan-sub">${esc(cy.next_note)}</p>` : ""}
    </div>` : ""}`;
}

// Assemble the page: brand + the view tabs + the active view + the shared
// colour explainer/footer. Re-run on every tab switch or week switch.
function renderAll() {
  const app = document.getElementById("app");
  if (!WEEKS.length) { app.innerHTML = '<p class="week">No data yet.</p>'; return; }

  const tabs = `
    <div class="tabs" role="tablist" aria-label="Choose report view">
      <button class="tab" role="tab" data-view="weekly" aria-selected="${activeView === "weekly"}">This week</button>
      <button class="tab" role="tab" data-view="monthly" aria-selected="${activeView === "monthly"}">Last 4 weeks</button>
    </div>`;

  const view = activeView === "monthly" ? renderMonthly() : renderWeekly();

  app.innerHTML = `
    <p class="brand">Dark Horse · Meta Ads</p>
    ${tabs}
    ${view}

    <div class="block explainer">
      <h3><span class="icon">?</span>What the colours mean</h3>
      <ul>
        <li><strong>Good</strong> — this is healthy. Keep going, nothing to change.</li>
        <li><strong>Keep an eye</strong> — fine for now, just worth watching. No change yet.</li>
        <li><strong>Needs attention</strong> — something's off. We change one thing (usually the ad, the audience, or the landing page) and give it two weeks before judging.</li>
        <li><strong>“early”</strong> — too soon to read. Week-one numbers bounce around, so we wait before acting.</li>
        <li><strong>Tap a number</strong> in "This week" to see how it has moved week to week.</li>
      </ul>
    </div>

    ${DATA.sheet_url ? `<a class="sheet-link" href="${esc(DATA.sheet_url)}" target="_blank" rel="noopener">Want the full detail? Open the numbers sheet →</a>` : ""}

    <footer>
      Updated automatically each week from the Meta Ads dashboard.<br />
      Last updated: ${esc(DATA.updated || "—")} · Prepared by Ronan.${DATA.sheet_url ? ` · <a href="${esc(DATA.sheet_url)}" target="_blank" rel="noopener">Full sheet</a>` : ""}
    </footer>`;

  wireEvents();
}

// Attach listeners after each render (innerHTML wipes the old ones).
function wireEvents() {
  const app = document.getElementById("app");
  app.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      const v = btn.getAttribute("data-view");
      if (v && v !== activeView) { activeView = v; renderAll(); }
    });
  });
  const sel = app.querySelector("#week-select");
  if (sel) sel.addEventListener("change", e => {
    const i = parseInt(e.target.value, 10);
    if (!Number.isNaN(i) && i >= 0 && i < WEEKS.length) { selectedIndex = i; renderAll(); }
  });
  app.querySelectorAll(".metric-card").forEach(btn => {
    btn.addEventListener("click", () => {
      const expanded = btn.getAttribute("aria-expanded") === "true";
      btn.setAttribute("aria-expanded", String(!expanded));
      const panel = btn.querySelector(".card-panel");
      if (panel) panel.hidden = expanded; // hidden becomes the OLD state's opposite
    });
  });
}

// Entry: data inlined at build time (see build.sh), then the page is StatiCrypt-encrypted.
function render(data) {
  DATA = data;
  WEEKS = data.weeks || [];
  selectedIndex = WEEKS.length - 1; // default to the most recent week
  renderAll();
}

const DATA_RAW = __DATA__;
render(DATA_RAW);
</script>
</body>
</html>
